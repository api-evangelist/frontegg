  schemas:
    EventEnvelope:
      type: object
      description: |
        Common envelope shape inferred from Frontegg's webhook documentation. Concrete
        envelope fields are not exhaustively published by Frontegg; receivers should
        rely on `eventKey` to discriminate and treat additional fields as informational.
      properties:
        eventKey:
          type: string
          description: Frontegg event identifier (e.g. frontegg.user.created).
        eventContext:
          type: object
          description: Identifiers for the tenant and user the event is scoped to.
          properties:
            tenantId:
              type: string
              description: Tenant the event occurred in.
            userId:
              type: string
              description: Acting or subject user, when applicable.
        data:
          description: Event-specific payload object.
          type: object
      required:
        - eventKey
    UserData:
      type: object
      description: User resource subset.
      properties:
        id:
          type: string
          description: Frontegg user identifier.
        email:
          type: string
          format: email
        name:
          type: string
        tenantId:
          type: string
        profilePictureUrl:
          type: string
          format: uri
        verified:
          type: boolean
        metadata:
          type: object
          additionalProperties: true
    UserAuthenticationData:
      allOf:
        - $ref: '#/components/schemas/UserData'
        - type: object
          properties:
            ip:
              type: string
              description: IP address used during authentication.
            userAgent:
              type: string
            authStrategy:
              type: string
              description: |
                Authentication strategy used (e.g. password, mfa, sso, saml, social).
    FailedAuthenticationData:
      type: object
      properties:
        email:
          type: string
          format: email
        tenantId:
          type: string
        ip:
          type: string
        userAgent:
          type: string
        reason:
          type: string
          description: Reason for the authentication failure when available.
    MFAEventData:
      allOf:
        - $ref: '#/components/schemas/UserData'
        - type: object
          properties:
            mfaStrategy:
              type: string
              description: MFA strategy involved (totp, sms, webauthn, etc.).
    UserTenantMembershipData:
      type: object
      properties:
        userId:
          type: string
        email:
          type: string
          format: email
        tenantId:
          type: string
        invitedBy:
          type: string
          description: User who issued the invitation, when applicable.
        roleIds:
          type: array
          items:
            type: string
    TemporaryAccessData:
      allOf:
        - $ref: '#/components/schemas/UserData'
        - type: object
          properties:
            expiresAt:
              type: string
              format: date-time
              description: When the temporary access expires.
    ApiTokenData:
      type: object
      properties:
        id:
          type: string
          description: Token identifier (not the secret).
        clientId:
          type: string
        description:
          type: string
        tenantId:
          type: string
        userId:
          type: string
        createdBy:
          type: string
    TenantData:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        website:
          type: string
        creatorEmail:
          type: string
          format: email
        metadata:
          type: object
          additionalProperties: true
    GroupData:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        description:
          type: string
        color:
          type: string
        managedBy:
          type: string
    GroupMembershipChangeData:
      type: object
      properties:
        groupId:
          type: string
        tenantId:
          type: string
        userIds:
          type: array
          items:
            type: string
    GroupRolesChangeData:
      type: object
      properties:
        groupId:
          type: string
        tenantId:
          type: string
        roleIds:
          type: array
          items:
            type: string
    DomainRestrictionData:
      type: object
      properties:
        tenantId:
          type: string
        domain:
          type: string
          description: Domain that was restricted from sign-up.
        restrictedBy:
          type: string
    UserAppAssignmentData:
      type: object
      properties:
        userId:
          type: string
        tenantId:
          type: string
        appId:
          type: string
    TenantAppAssignmentData:
      type: object
      properties:
        tenantId:
          type: string
        appId:
          type: string
    TenantPlanAssignmentData:
      type: object
      properties:
        tenantId:
          type: string
        planId:
          type: string
    UserPlanAssignmentData:
      type: object
      properties:
        userId:
          type: string
        tenantId:
          type: string
        planId:
          type: string
    ScimUserData:
      type: object
      properties:
        userId:
          type: string
        tenantId:
          type: string
        externalId:
          type: string
        email:
          type: string
          format: email
        userName:
          type: string
        active:
          type: boolean
    ScimGroupData:
      type: object
      properties:
        groupId:
          type: string
        tenantId:
          type: string
        externalId:
          type: string
        displayName:
          type: string
        members:
          type: array
          items:
            type: object
            properties:
              userId:
                type: string
              externalId:
                type: string
