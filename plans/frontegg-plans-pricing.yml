specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Frontegg
providerId: frontegg
created: '2026-05-22'
modified: '2026-05-22'
reconciled: true
tags:
  - CIAM
  - Identity
  - B2B SaaS
  - Authentication
description: >-
  Frontegg pricing as published on https://frontegg.com/pricing. Two tiers:
  a free "Pay as you go" tier including 7,500 MAU and 5 Enterprise Connections,
  and an Enterprise tier with custom pricing and 99.99% uptime SLA.
sources:
  - https://frontegg.com/pricing
plans:
  - id: frontegg-pay-as-you-go
    name: Pay as you go
    type: freemium
    description: >-
      "Start free. Scale as you grow." Pay only for what you use, starting free
      up to 7,500 monthly active users. Always includes fully customized hosted
      login, 5 Enterprise Connections (SSO/SCIM), unlimited organizations, and
      a custom domain.
    entries:
      - label: Monthly Active Users included
        name: mau_included
        type: quota
        metric: MAU
        limit: 7500
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Enterprise Connections (SSO/SCIM)
        name: enterprise_connections
        type: quota
        metric: connection
        limit: 5
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Fully Customized Hosted Login
      - name: Unlimited Organizations
      - name: Custom Domain
      - name: Password and Passwordless Authentication
      - name: Social Logins
      - name: Multi-Factor Authentication
      - name: Passkeys
      - name: Roles, Permissions, and RBAC
      - name: Feature Flags
      - name: Subscription Management
      - name: Machine-to-Machine (M2M) Tokens
      - name: User Invitations and Groups
      - name: Tenant-Level Policies
      - name: Self-Service Portal
  - id: frontegg-enterprise
    name: Enterprise
    type: enterprise
    description: >-
      Custom pricing with multiple environments, advanced fraud protection,
      99.99% uptime SLA, premium support, and add-ons available. Contact sales.
    entries:
      - label: Annual (custom)
        name: annual
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Multiple Environments
      - name: Advanced Fraud Protection
      - name: Identity Protection (Bot Detection, Risk Analytics)
      - name: 99.99% Uptime SLA
      - name: Premium Support
      - name: Add-ons Available
      - name: Multi-app and Hierarchies (Federation, External Pools)
      - name: Advanced B2B Features
